version: "3.8"

services:
  api:
    build: .
    container_name: allmaxtools-api
    ports:
      - "8181:8000"
    environment:
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: 123
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE: prototype
    depends_on:
      - mysql
    networks:
      - allmaxtools-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: allmaxtools-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: prototype
      MYSQL_USER: prototype
      MYSQL_PASSWORD: 123
      TZ: America/Sao_Paulo
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - allmaxtools-network
    restart: unless-stopped

networks:
  allmaxtools-network:
    driver: bridge

volumes:
  mysql-data:




